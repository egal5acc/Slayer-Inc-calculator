<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Rune Calculator CLEAN</title>
<style>
body {
  font-family: Arial;
  background: #0f0f1a;
  color: white;
  margin: 0;
  padding: 20px;
}

h1 { color: #b36bff; }

.container { display: flex; gap: 20px; }

.panel {
  background: #1b1b2a;
  padding: 15px;
  border-radius: 10px;
  width: 300px;
}

input, select {
  width: 100%;
  margin: 5px 0;
  padding: 8px;
  border-radius: 5px;
  border: none;
}

button {
  width: 100%;
  padding: 10px;
  background: #b36bff;
  border: none;
  color: white;
  cursor: pointer;
  margin-top: 10px;
}

.tabs button {
  width: 19%;
  font-size: 12px;
}

.rune-list {
  flex: 1;
  background: #1b1b2a;
  padding: 15px;
  border-radius: 10px;
}

.rune {
  background: #2a2a3d;
  padding: 10px;
  margin: 8px 0;
  border-radius: 8px;
}
</style>
</head>

<body>

<h1>🔮 Rune Calculator (CLEAN)</h1>

<div class="container">

<div class="panel">
<h3>Settings</h3>

<label>Rune Speed (sec per roll)</label>
<input id="speed" type="number" step="0.01" value="0.5" min="0.1" max="1">

<label>Rune Bulk</label>
<input id="bulk" type="number" value="100">

<label>Rune Luck</label>
<input id="luck" type="number" value="1">

<label>Clone</label>
<input id="clone" type="number" value="1">

<button onclick="calc()">Calculate</button>
</div>

<div class="rune-list">

<div class="tabs">
<button onclick="setType('starter')">Starter</button>
<button onclick="setType('golden')">Golden</button>
<button onclick="setType('magma')">Magma</button>
<button onclick="setType('plasma')">Plasma</button>
<button onclick="setType('snow')">Snow</button>
</div>

<div id="output"></div>

</div>
</div>

<script>
let type = "starter";

const data = {
starter: [
{name:"Common", need:364},
{name:"Uncommon", need:313},
{name:"Rare", need:625},
{name:"Epic", need:250},
{name:"Legendary", need:78},
{name:"Mythical", need:10000},
{name:"Secret", need:34}
],

golden: [
{name:"Shiny", need:5720},
{name:"Regal", need:186},
{name:"Auric", need:12900}
],

magma: [
{name:"Charred", need:250000},
{name:"Ignis", need:5400000},
{name:"Cinder", need:240}
],

plasma: [
{name:"Plasmatic", need:5000000000},
{name:"Arclight", need:32200},
{name:"Voltaris", need:62500}
],

snow: [
{name:"Snowfall", need:4500},
{name:"Frostbite", need:36900},
{name:"Icebound", need:2}
]
};

function setType(t){
type = t;
calc();
}

function format(n){
if(n < 1000) return n;
const units = ["K","M","B","T","Qa","Qi","Sx","Sp","Oc","No","Dc","Ud","Dd","Td"];
let i = 0;
while(n >= 1000 && i < units.length-1){
n /= 1000;
i++;
}
return n.toFixed(2) + units[i];
}

function calc(){

let speed = parseFloat(document.getElementById("speed").value);
let bulk = parseFloat(document.getElementById("bulk").value);
let luck = parseFloat(document.getElementById("luck").value);
let clone = parseFloat(document.getElementById("clone").value);

let rollsPerSec = (1 / speed) * bulk * luck;

let html = "";

for(let r of data[type]){

let perSec = rollsPerSec * clone;
let time = r.need / perSec;

html += `
<div class="rune">
<b>${r.name}</b><br>
Need: ${format(r.need)}<br>
Time: ${format(time)} sec
</div>
`;
}

document.getElementById("output").innerHTML = html;
}

calc();
</script>

</body>
</html>
