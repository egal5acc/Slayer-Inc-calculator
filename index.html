<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slayer Inc Rune Calculator</title>
<style>
    :root {
        --bg-main: #0b0d10;
        --bg-panel: #161a22;
        --bg-card: #1c212b;
        --bg-box: #242a35;
        --border: #2e3545;
        --text-main: #e0e6ed;
        --text-muted: #8b949e;
        
        --c-common: #a0a0a0;
        --c-uncommon: #4caf50;
        --c-rare: #2196f3;
        --c-epic: #9c27b0;
        --c-legendary: #ff9800;
        --c-mythical: #f44336;
        --c-secret: #ffd700;
        --c-unknown: #8a2be2;
        --c-celestial: #00ffff;
        --c-ancient: #fffacd;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: var(--bg-main);
        color: var(--text-main);
        line-height: 1.5;
        padding: 20px;
    }

    .container { max-width: 1200px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }
    
    .panel {
        background: var(--bg-panel);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 20px;
    }

    h1 { text-align: center; margin-bottom: 20px; font-size: 24px; color: #fff; }

    .input-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 15px;
    }

    .input-group { display: flex; flex-direction: column; gap: 5px; }
    .input-group label { font-size: 13px; color: var(--text-muted); font-weight: bold; }
    
    .input-row {
        display: flex;
        gap: 5px;
    }

    input, select {
        background: var(--bg-main);
        border: 1px solid var(--border);
        color: #fff;
        padding: 12px;
        border-radius: 8px;
        font-size: 16px;
        outline: none;
        transition: border-color 0.2s;
    }
    input:focus, select:focus { border-color: var(--c-rare); }
    input { flex: 1; min-width: 0; }
    select { cursor: pointer; }

    .error-box {
        background: #2a1414;
        border: 1px solid var(--c-mythical);
        color: #ff8888;
        padding: 15px;
        border-radius: 8px;
        font-weight: bold;
        text-align: center;
        margin-top: 15px;
        display: none;
    }

    .global-stats {
        margin-top: 15px;
        padding-top: 15px;
        border-top: 1px solid var(--border);
        display: flex;
        justify-content: space-around;
        font-size: 14px;
        color: var(--text-muted);
    }
    .global-stats span { color: #fff; font-weight: bold; }

    .tabs {
        display: flex;
        gap: 10px;
        overflow-x: auto;
        padding-bottom: 5px;
    }

    .tab-btn {
        background: var(--bg-main);
        border: 1px solid var(--border);
        color: var(--text-muted);
        padding: 10px 20px;
        border-radius: 8px;
        cursor: pointer;
        font-weight: bold;
        transition: 0.2s;
    }
    .tab-btn.active { background: var(--border); color: #fff; }

    .cards-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
        gap: 20px;
        margin-top: 20px;
    }

    .card {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 15px;
        display: flex;
        flex-direction: column;
        gap: 15px;
    }

    .card-header { text-align: center; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
    .card-title { font-size: 18px; font-weight: bold; text-transform: uppercase; margin-bottom: 5px; }
    .card-chance { font-size: 12px; color: var(--text-muted); }

    .stat-box {
        background: var(--bg-box);
        border-radius: 8px;
        padding: 12px;
        border-left: 4px solid var(--border);
    }
    .stat-head { display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 8px; font-size: 14px; }
    .stat-val { color: var(--c-secret); }
    
    .stat-details {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 5px;
        font-size: 12px;
        color: var(--text-muted);
    }
    .stat-details span { color: #fff; font-weight: bold; }
    .time-highlight { color: var(--c-rare) !important; }

    .common { color: var(--c-common); border-left-color: var(--c-common); }
    .uncommon { color: var(--c-uncommon); border-left-color: var(--c-uncommon); }
    .rare { color: var(--c-rare); border-left-color: var(--c-rare); }
    .epic { color: var(--c-epic); border-left-color: var(--c-epic); }
    .legendary { color: var(--c-legendary); border-left-color: var(--c-legendary); }
    .mythical { color: var(--c-mythical); border-left-color: var(--c-mythical); }
    .secret { color: var(--c-secret); border-left-color: var(--c-secret); text-shadow: 0 0 5px rgba(255,215,0,0.3); }
    .unknown { color: var(--c-unknown); border-left-color: var(--c-unknown); text-shadow: 0 0 5px rgba(138,43,226,0.3); }
    .celestial { color: var(--c-celestial); border-left-color: var(--c-celestial); text-shadow: 0 0 5px rgba(0,255,255,0.3); }
    .ancient { color: var(--c-ancient); border-left-color: var(--c-ancient); text-shadow: 0 0 5px rgba(255,250,205,0.3); }
</style>
</head>
<body>

<div class="container">
    <div class="panel">
        <h1>Slayer Inc Rune Calculator</h1>
        
        <!-- RUNE CALCULATOR CONTROLS -->
        <div class="input-grid" id="rune-controls">
            <div class="input-group">
                <label>Rune Speed (sec)</label>
                <input type="number" id="speed" value="0.1" step="0.01">
            </div>
            <div class="input-group">
                <label>Rune Bulk</label>
                <div class="input-row">
                    <input type="number" id="bulk-num" value="100">
                    <select id="bulk-suf"></select>
                </div>
            </div>
            <div class="input-group">
                <label>Rune Luck</label>
                <div class="input-row">
                    <input type="number" id="luck-num" value="2.5" step="0.1">
                    <select id="luck-suf"></select>
                </div>
            </div>
            <div class="input-group">
                <label>Rune Clone</label>
                <input type="number" id="clone" value="3">
            </div>
        </div>

        <!-- XP CALCULATOR CONTROLS (Hidden by default) -->
        <div class="input-grid" id="xp-controls" style="display: none;">
            <div class="input-group">
                <label>Current Level (S)</label>
                <input type="number" id="xp-start" value="1" min="1">
            </div>
            <div class="input-group">
                <label>Target Level (E)</label>
                <input type="number" id="xp-end" value="10" min="2">
            </div>
            <div class="input-group">
                <label>Required XP</label>
                <input type="text" id="xp-result" readonly style="color: var(--c-secret); font-weight: bold; background: var(--bg-box); cursor: default;">
            </div>
        </div>
        
        <div id="error-box" class="error-box">⚠️ SYSTEM ERROR: Rune Speed must be between 0.08s and 1.00s!</div>

        <div class="global-stats" id="global-stats-bar">
            <div>Rolls/sec: <span id="out-rolls">0</span></div>
            <div>Runes/sec: <span id="out-runs">0</span></div>
        </div>
    </div>

    <div class="panel">
        <div class="tabs" id="tabs-container"></div>
        <div class="cards-grid" id="cards-container"></div>
        <div id="xp-message" style="display:none; text-align:center; padding: 40px; color: var(--text-muted); font-size: 16px; font-weight: bold;">
            Match your levels in the box above to see the exact XP required.
        </div>
    </div>
</div>

function parseStringValue(str) {
    if(!str) return 0;
    str = String(str).toLowerCase().replace(/,/g, '').trim();
    const match = str.match(/^([0-9.]+)([a-z]*)$/);
    if (!match) return parseFloat(str) || 0;
    let val = parseFloat(match[1]);
    let suf = match[2];
    if (suf) {
        if(suf === 'de') suf = 'dc';
        const found = SUFFIXES.find(x => x.s.toLowerCase() === suf);
        if (found) val *= found.v;
    }
    return val;
}

function formatNum(num) {
    if (!isFinite(num) || isNaN(num) || num <= 0) return "0";
    if (num < 1000) return Number.isInteger(num) ? num.toString() : num.toFixed(2);
    for (let i = 0; i < SUFFIXES.length; i++) {
        if (SUFFIXES[i].s !== 'None' && num >= SUFFIXES[i].v) {
            return (num / SUFFIXES[i].v).toFixed(2) + SUFFIXES[i].s;
        }
    }
    return num.toFixed(2);
}

function formatTime(sec) {
    if (!isFinite(sec) || isNaN(sec) || sec <= 0) return "N/A";
    if (sec < 60) return sec.toFixed(1) + "s";
    if (sec < 3600) return Math.floor(sec/60) + "m " + Math.floor(sec%60) + "s";
    if (sec < 86400) return Math.floor(sec/3600) + "h " + Math.floor((sec%3600)/60) + "m";
    if (sec < 2592000) return Math.floor(sec/86400) + "d " + Math.floor((sec%86400)/3600) + "h";
    if (sec < 31536000) return Math.floor(sec/2592000) + "mo " + Math.floor((sec%2592000)/86400) + "d";
    return Math.floor(sec/31536000) + "y " + Math.floor((sec%31536000)/2592000) + "mo";
}

let currentTab = "Starter";

function initDropdowns() {
    const bSuf = document.getElementById("bulk-suf");
    const lSuf = document.getElementById("luck-suf");
    const reversedSuffixes = [...SUFFIXES].reverse();
    
    reversedSuffixes.forEach(x => {
        const op1 = document.createElement("option");
        op1.value = x.s; op1.innerText = x.s;
        bSuf.appendChild(op1);
        
        const op2 = document.createElement("option");
        op2.value = x.s; op2.innerText = x.s;
        lSuf.appendChild(op2);
    });
    
    bSuf.value = "None";
    lSuf.value = "None";
}

function renderTabs() {
    // XP Calculator is now the first tab, followed by all Rune Tabs
    const tabs = ["XP Calculator"].concat(Object.keys(DATA));
    const cont = document.getElementById("tabs-container");
    cont.innerHTML = tabs.map(tab => 
        `<div class="tab-btn ${tab===currentTab?'active':''}" onclick="setTab('${tab}')">${tab}</div>`
    ).join("");
}

function setTab(tab) {
    currentTab = tab;
    renderTabs();
    
    // Toggle logic between Rune Settings and XP Settings
    if (tab === "XP Calculator") {
        document.getElementById("rune-controls").style.display = "none";
        document.getElementById("xp-controls").style.display = "grid";
        
        document.getElementById("error-box").style.display = "none";
        document.getElementById("global-stats-bar").style.display = "none";
        
        document.getElementById("cards-container").style.display = "none";
        document.getElementById("xp-message").style.display = "block";
        
        calculateXP();
    } else {
        document.getElementById("rune-controls").style.display = "grid";
        document.getElementById("xp-controls").style.display = "none";
        
        document.getElementById("cards-container").style.display = "grid";
        document.getElementById("xp-message").style.display = "none";
        
        calculate();
    }
}

function getMultiplier(suffixStr) {
    const found = SUFFIXES.find(x => x.s === suffixStr);
    return found ? found.v : 1;
}

function calculateXP() {
    const S = parseFloat(document.getElementById("xp-start").value) || 0;
    const E = parseFloat(document.getElementById("xp-end").value) || 0;
    
    if (E <= S) {
        document.getElementById("xp-result").value = "0 (E must be > S)";
        return;
    }
    
    // Formula for XP
    const xp = 500 * (Math.pow(1.2, E) - Math.pow(1.2, S));
    document.getElementById("xp-result").value = formatNum(xp);
}

function calculate() {
    const speed = parseFloat(document.getElementById("speed").value) || 0;
    const clone = parseFloat(document.getElementById("clone").value) || 1;
    
    const errBox = document.getElementById("error-box");
    const statsBar = document.getElementById("global-stats-bar");
    const cardsCont = document.getElementById("cards-container");

    if (speed < 0.08 || speed > 1.00) {
        errBox.style.display = "block";
        statsBar.style.display = "none";
        cardsCont.innerHTML = `<div style="text-align:center; color:var(--c-mythical); width:100%; grid-column: 1/-1; padding: 40px; font-weight:bold;">CALCULATION HALTED DUE TO SPEED ERROR</div>`;
        return;
    } else {
        errBox.style.display = "none";
        statsBar.style.display = "flex";
    }

    const bulkNum = parseFloat(document.getElementById("bulk-num").value) || 0;
    const bulkMult = getMultiplier(document.getElementById("bulk-suf").value);
    const bulk = bulkNum * bulkMult;

    const luckNum = parseFloat(document.getElementById("luck-num").value) || 0;
    const luckMult = getMultiplier(document.getElementById("luck-suf").value);
    const luck = luckNum * luckMult;

    const rollsPerSec = speed > 0 ? (1 / speed) : 0;
    const runsPerSec = rollsPerSec * bulk;

    document.getElementById("out-rolls").innerText = formatNum(rollsPerSec);
    document.getElementById("out-runs").innerText = formatNum(runsPerSec);

    let html = "";

    // Safety check in case the current tab isn't in DATA (e.g. for the XP Calc)
    if (!DATA[currentTab]) return;

    DATA[currentTab].forEach(rune => {
        const baseDenom = parseStringValue(rune.c);
        const currentDenom = baseDenom / luck;

        const currentIndex = DATA[currentTab].indexOf(rune);
        const nextRune = DATA[currentTab][currentIndex + 1];

        let isNA = (runsPerSec <= 0);

        if (nextRune) {
            const nextDenom = parseStringValue(nextRune.c) / luck;

            if (nextDenom <= 1) {
                isNA = true;
            }
        }

        const displayDenom = Math.max(currentDenom, 1);

        const expectedDropsPerSec = isNA ? 0 : (runsPerSec * (1 / displayDenom) * clone);
        const chanceStr = isNA ? "N/A" : `1 in ${formatNum(displayDenom)}`;
        const expStr = isNA ? "N/A" : formatNum(expectedDropsPerSec);
        
        html += `
        <div class="card">
            <div class="card-header">
                <div class="card-title ${rune.t}">${rune.r}</div>
                <div class="card-chance">Base: 1 in ${formatNum(baseDenom)} | Current: ${chanceStr}</div>
            </div>`;

        rune.s.forEach(stat => {
            const needVal = parseStringValue(stat.nd);
            const timeSec = (!isNA && expectedDropsPerSec > 0) ? (needVal / expectedDropsPerSec) : Infinity;
            const timeStr = (isNA || timeSec === Infinity) ? "N/A" : formatTime(timeSec);
            
            html += `
            <div class="stat-box ${rune.t}">
                <div class="stat-head">
                    <span>${stat.n} <span class="stat-val">${stat.v}</span></span>
                </div>
                <div class="stat-details">
                    <div>Need: <span>${formatNum(needVal)}</span></div>
                    <div>Exp/sec: <span>${expStr}</span></div>
                    <div style="grid-column: span 2; margin-top:5px;">
                        Time to Max: <span class="time-highlight">${timeStr}</span>
                    </div>
                </div>
            </div>`;
        });

        html += `</div>`;
    });

    cardsCont.innerHTML = html;
}

initDropdowns();

// Event listeners for storing values in Local Storage
const inputIds = ['speed', 'bulk-num', 'bulk-suf', 'luck-num', 'luck-suf', 'clone', 'xp-start', 'xp-end'];
inputIds.forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;

    if(localStorage.getItem('slayer_v3_'+id)) el.value = localStorage.getItem('slayer_v3_'+id);
    
    const handler = () => {
        localStorage.setItem('slayer_v3_'+id, el.value);
        if (currentTab === "XP Calculator") {
            calculateXP();
        } else {
            calculate();
        }
    };
    
    el.addEventListener('input', handler);
    el.addEventListener('change', handler);
});

renderTabs();
calculate();
</script>
</body>
</html>
