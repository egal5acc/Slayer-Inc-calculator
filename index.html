<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slayer Inc Rune Calculator</title>
<style>
    :root {
        --bg-main: #0b0d10;
        --bg-panel: #161a22;
        --bg-card: #1c212b;
        --bg-box: #242a35;
        --border: #2e3545;
        --text-main: #e0e6ed;
        --text-muted: #8b949e;
        --c-common: #a0a0a0; --c-uncommon: #4caf50; --c-rare: #2196f3; --c-epic: #9c27b0;
        --c-legendary: #ff9800; --c-mythical: #f44336; --c-secret: #ffd700; --c-unknown: #8a2be2;
        --c-celestial: #00ffff; --c-ancient: #fffacd;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-main); color: var(--text-main); padding: 20px; }
    .container { max-width: 1200px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }
    .panel { background: var(--bg-panel); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
    h1 { text-align: center; margin-bottom: 20px; font-size: 24px; }
    .input-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 15px; }
    .input-group { display: flex; flex-direction: column; gap: 5px; }
    .input-group label { font-size: 13px; color: var(--text-muted); font-weight: bold; }
    .input-row { display: flex; gap: 5px; }
    input, select { background: var(--bg-main); border: 1px solid var(--border); color: #fff; padding: 12px; border-radius: 8px; font-size: 16px; }
    .error-box { background: #2a1414; border: 1px solid var(--c-mythical); color: #ff8888; padding: 15px; border-radius: 8px; font-weight: bold; text-align: center; margin-top: 15px; display: none; }
    .tabs { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 15px; }
    .tab-btn { background: var(--bg-main); border: 1px solid var(--border); color: var(--text-muted); padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
    .tab-btn.active { background: var(--border); color: #fff; }
    .cards-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; }
    .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
    .card-title { font-size: 18px; font-weight: bold; text-transform: uppercase; }
    .stat-box { background: var(--bg-box); padding: 10px; border-left: 4px solid var(--border); font-size: 13px; }
    .stat-val { color: var(--c-secret); font-weight: bold; }
    .common { border-left-color: var(--c-common); } .uncommon { border-left-color: var(--c-uncommon); }
    .rare { border-left-color: var(--c-rare); } .epic { border-left-color: var(--c-epic); }
    .legendary { border-left-color: var(--c-legendary); } .mythical { border-left-color: var(--c-mythical); }
    .secret { border-left-color: var(--c-secret); } .unknown { border-left-color: var(--c-unknown); }
    .celestial { border-left-color: var(--c-celestial); } .ancient { border-left-color: var(--c-ancient); }
</style>
</head>
<body>

<div class="container">
    <div class="panel">
        <h1>Slayer Inc Rune Calculator</h1>
        <div class="input-grid">
            <div class="input-group">
                <label>Rune Speed (sec)</label>
                <input type="number" id="speed" value="0.1" step="0.01">
            </div>
            <div class="input-group">
                <label>Rune Bulk</label>
                <div class="input-row"><input type="number" id="bulk-num" value="100"><select id="bulk-suf"></select></div>
            </div>
            <div class="input-group">
                <label>Rune Luck</label>
                <div class="input-row"><input type="number" id="luck-num" value="2.5" step="0.1"><select id="luck-suf"></select></div>
            </div>
            <div class="input-group">
                <label>Rune Clone</label>
                <input type="number" id="clone" value="3">
            </div>
        </div>
        <div id="error-box" class="error-box">⚠️ SYSTEM ERROR: Speed must be 0.08s - 1.00s!</div>
    </div>
    <div class="panel">
        <div class="tabs" id="tabs-container"></div>
        <div class="cards-grid" id="cards-container"></div>
    </div>
</div>

<script>
const SUFFIXES = [{v: 1e117, s: 'Notg'}, {v: 1e114, s: 'Octg'}, {v: 1e111, s: 'Sptg'}, {v: 1e108, s: 'Sxtg'}, {v: 1e105, s: 'Qitg'}, {v: 1e102, s: 'Qatg'}, {v: 1e99, s: 'Tt'}, {v: 1e96, s: 'Dtg'}, {v: 1e93, s: 'Utg'}, {v: 1e90, s: 'Tr'}, {v: 1e87, s: 'Novg'}, {v: 1e84, s: 'Ocvg'}, {v: 1e81, s: 'Spvg'}, {v: 1e78, s: 'Sxvg'}, {v: 1e75, s: 'Qavg'}, {v: 1e72, s: 'Tvg'}, {v: 1e69, s: 'Dvg'}, {v: 1e66, s: 'Uvg'}, {v: 1e63, s: 'Vg'}, {v: 1e60, s: 'Nd'}, {v: 1e57, s: 'Ocd'}, {v: 1e54, s: 'Spd'}, {v: 1e51, s: 'Sxd'}, {v: 1e48, s: 'Qui'}, {v: 1e45, s: 'Qua'}, {v: 1e42, s: 'Td'}, {v: 1e39, s: 'Dd'}, {v: 1e36, s: 'Ud'}, {v: 1e33, s: 'Dc'}, {v: 1e30, s: 'N'}, {v: 1e27, s: 'Oc'}, {v: 1e24, s: 'Sp'}, {v: 1e21, s: 'Sx'}, {v: 1e18, s: 'Qi'}, {v: 1e15, s: 'Qa'}, {v: 1e12, s: 'T'}, {v: 1e9, s: 'B'}, {v: 1e6, s: 'M'}, {v: 1e3, s: 'K'}, {v: 1, s: 'None'}];
const DATA = {
    Starter: [{ r: "Common", c: "1.00", t: "common", s: [{n: "Power", v: "+5", nd: "100"}, {n: "Gold Gain", v: "+0.1", nd: "50"}] }, { r: "Uncommon", c: "6.06", t: "uncommon", s: [{n: "Power", v: "+25", nd: "313"}, {n: "Player XP", v: "+5", nd: "143"}] }, { r: "Rare", c: "100.20", t: "rare", s: [{n: "Essence", v: "+125", nd: "625"}] }, { r: "Epic", c: "1.252K", t: "epic", s: [{n: "Power", v: "+300", nd: "250"}, {n: "Gold Gain", v: "+1.25", nd: "25"}] }, { r: "Legendary", c: "60.11K", t: "legendary", s: [{n: "Power", v: "+1.25K", nd: "78"}, {n: "Player XP", v: "+15", nd: "45"}, {n: "Rune Bulk", v: "×1.5", nd: "5"}] }, { r: "Mythical", c: "606.1K", t: "mythical", s: [{n: "Power", v: "+100K", nd: "10K"}, {n: "Gold Gain", v: "×4", nd: "60"}, {n: "Rune Luck", v: "×2.25", nd: "9"}] }, { r: "Secret", c: "2.594M", t: "secret", s: [{n: "Power", v: "×10", nd: "34"}, {n: "Rune Clone", v: "×2", nd: "1"}] }, { r: "Unknown", c: "10.01B", t: "unknown", s: [{n: "Damage", v: "×10", nd: "232"}, {n: "Essence", v: "×100", nd: "95"}, {n: "Rune Luck", v: "×2.25", nd: "13"}] }, { r: "Celestial", c: "400.7Oc", t: "celestial", s: [{n: "Player XP", v: "×10", nd: "1.5K"}, {n: "Gold Gain", v: "×12", nd: "22K"}, {n: "Rune Bulk", v: "×5", nd: "8K"}] }, { r: "Ancient", c: "40.07Ud", t: "ancient", s: [{n: "Plasma Points", v: "×10", nd: "6.56K"}, {n: "Spirit Orbs", v: "×75", nd: "1.08M"}, {n: "Rune Luck", v: "×3", nd: "59"}] }],
    Golden: [{ r: "Shiny", c: "1.00", t: "uncommon", s: [{n: "Gold Gain", v: "+8", nd: "5.72K"}, {n: "Player XP", v: "+10", nd: "57.7K"}] }, { r: "Regal", c: "100K", t: "rare", s: [{n: "Gold Gain", v: "+25", nd: "186"}] }, { r: "Auric", c: "2M", t: "epic", s: [{n: "Damage", v: "+25", nd: "12.9K"}, {n: "Essence", v: "+20", nd: "46.5"}, {n: "Rune Luck", v: "×2.5", nd: "15"}] }, { r: "Imperial", c: "25M", t: "legendary", s: [{n: "Gold Gain", v: "+125", nd: "125"}, {n: "Player XP", v: "×2", nd: "20"}, {n: "Essence", v: "×25", nd: "800"}] }, { r: "Treasury", c: "125M", t: "mythical", s: [{n: "Power", v: "×8", nd: "39"}, {n: "Rune Luck", v: "×4", nd: "29"}, {n: "Gold Chance", v: "+5", nd: "5"}] }, { r: "Gilded", c: "2.75Qa", t: "secret", s: [{n: "Arcane Player XP", v: "×8", nd: "400"}, {n: "Lava", v: "×10", nd: "15.8K"}, {n: "Rune Bulk", v: "×3", nd: "40"}] }, { r: "Kingsmark", c: "900N", t: "unknown", s: [{n: "Power", v: "×75", nd: "3.7K"}, {n: "Gold Gain", v: "×10", nd: "57"}, {n: "Rune Luck", v: "×5", nd: "4.1K"}] }, { r: "Sol Sovereign", c: "1Nd", t: "celestial", s: [{n: "Gold Gain", v: "×100", nd: "198"}, {n: "Power", v: "×15", nd: "1.4K"}, {n: "Icey", v: "×5", nd: "20K"}] }],
    Magma: [{ r: "Charred", c: "1.00", t: "uncommon", s: [{n: "Magma", v: "+5", nd: "250K"}] }, { r: "Ignis", c: "499.9M", t: "rare", s: [{n: "Magma", v: "×15", nd: "5.4M"}, {n: "Damage", v: "+10", nd: "10K"}] }, { r: "Cinder", c: "24.49B", t: "epic", s: [{n: "Power", v: "+3", nd: "240"}, {n: "Gold Gain", v: "+3", nd: "45"}, {n: "Rune Luck", v: "×1.5", nd: "17"}] }, { r: "Pyric", c: "2.749T", t: "legendary", s: [{n: "Essence", v: "+45", nd: "563"}, {n: "Magma", v: "+25", nd: "100K"}, {n: "Rune Bulk", v: "×8", nd: "175"}] }, { r: "Searing", c: "97.49T", t: "mythical", s: [{n: "Magma", v: "×25", nd: "448B"}, {n: "Gold Gain", v: "+12", nd: "60"}, {n: "Rune Luck", v: "×3", nd: "80"}] }, { r: "Volcanic", c: "49.9Qa", t: "secret", s: [{n: "Power", v: "×15", nd: "16.4K"}, {n: "Lava", v: "×5", nd: "537"}, {n: "Magma", v: "×25", nd: "322"}] }, { r: "Worldflare", c: "9.999Sp", t: "unknown", s: [{n: "Plasma Points", v: "×5", nd: "810K"}, {n: "Player XP", v: "×5", nd: "256"}, {n: "Magma", v: "×10", nd: "250"}] }, { r: "Infernal Sigil", c: "124.9Dd", t: "celestial", s: [{n: "Power", v: "×45", nd: "1.53K"}, {n: "Player XP", v: "×10", nd: "18K"}, {n: "Rune Luck", v: "×9", nd: "111"}] }],
    Plasma: [{ r: "Plasmatic", c: "1.00", t: "uncommon", s: [{n: "Plasma Points", v: "+5", nd: "5B"}, {n: "Power", v: "+15", nd: "291B"}] }, { r: "Arclight", c: "999.9Qa", t: "rare", s: [{n: "Plasma Points", v: "+25", nd: "32.2K"}, {n: "Player XP", v: "×4", nd: "300"}, {n: "Rune Bulk", v: "×4", nd: "1M"}] }, { r: "Voltaris", c: "12.49Qi", t: "epic", s: [{n: "Lava", v: "×3", nd: "62.5K"}, {n: "Magma", v: "×25", nd: "2.4K"}, {n: "Rune Luck", v: "×5", nd: "1K"}] }, { r: "Aetherion", c: "4.599Sx", t: "legendary", s: [{n: "Power", v: "×12", nd: "2.49K"}, {n: "Plasma Points", v: "×5", nd: "20K"}, {n: "Rune Luck", v: "×7", nd: "60"}] }, { r: "Astralis", c: "2.499Oc", t: "mythical", s: [{n: "Plasma Points", v: "×9", nd: "16.8K"}, {n: "Lava", v: "×5", nd: "800"}, {n: "Rune Luck", v: "×3", nd: "80"}] }, { r: "Ecliptor", c: "499.9Td", t: "secret", s: [{n: "Plasma Points", v: "×10", nd: "1.95M"}, {n: "Lava", v: "×6", nd: "5K"}, {n: "Aura Luck", v: "×3", nd: "10K"}] }],
    Snow: [{ r: "Snowfall", c: "1.00", t: "uncommon", s: [{n: "Snowflakes", v: "×10", nd: "4.5K"}, {n: "Snowflakes", v: "×15", nd: "233M"}, {n: "Player XP", v: "×10", nd: "3.8T"}] }, { r: "Frostbite", c: "99.99N", t: "rare", s: [{n: "Power", v: "×40", nd: "36.9K"}, {n: "Player XP", v: "×10", nd: "430M"}, {n: "Snowflakes", v: "×7", nd: "800"}] }, { r: "Icebound", c: "1.999Dd", t: "epic", s: [{n: "Player XP", v: "×2", nd: "2"}, {n: "Snowflakes", v: "×5", nd: "1.6K"}, {n: "Plasma Points", v: "×9", nd: "1.68M"}] }, { r: "Glacial", c: "49.99Td", t: "legendary", s: [{n: "Power", v: "×50", nd: "3.91M"}, {n: "Magma", v: "×45", nd: "169B"}, {n: "Rune Luck", v: "×3", nd: "34"}] }, { r: "Winters Wrath", c: "999.9Qui", t: "mythical", s: [{n: "Power", v: "×25", nd: "16.8M"}, {n: "Snowflakes", v: "×5", nd: "800"}, {n: "Rune Bulk", v: "×5", nd: "10K"}] }, { r: "Absolute Zero", c: "12.49Spd", t: "secret", s: [{n: "Player XP", v: "×50", nd: "1.56B"}, {n: "Power", v: "×25", nd: "16.83M"}, {n: "Icey", v: "×15", nd: "1.4K"}] }, { r: "Eternal Whiteout", c: "29.99Nd", t: "unknown", s: [{n: "Power", v: "×25", nd: "659K"}, {n: "Icey", v: "×6", nd: "243"}, {n: "Aura Luck", v: "×2", nd: "2.5K"}] }],
    Icey: [{ r: "Frost", c: "1.00", t: "uncommon", s: [{n: "Power", v: "×10", nd: "1.953Dc"}, {n: "Icey", v: "×4", nd: "3Qa"}, {n: "Player XP", v: "×10", nd: "12.16Qi"}] }, { r: "Glacier", c: "3.99Qua", t: "rare", s: [{n: "Golden Points", v: "×100", nd: "1.485M"}, {n: "Icey", v: "×5", nd: "50.625K"}, {n: "Player Xp", v: "×10", nd: "9"}] }, { r: "Cryo", c: "84.99Ocd", t: "epic", s: [{n: "Power", v: "×35", nd: "24.6M"}, {n: "Icey", v: "×5", nd: "4.096K"}, {n: "Aura Luck", v: "×2", nd: "50K"}] }]
};

function parseS(s) { let m = String(s).toLowerCase().match(/^([0-9.]+)([a-z]*)$/); if (!m) return parseFloat(s)||0; let v = parseFloat(m[1]), x = SUFFIXES.find(e=>e.s.toLowerCase()===m[2]); return x ? v*x.v : v; }
function formatN(n) { if (n<1000) return n.toFixed(2).replace(/\.00$/,''); for(let x of SUFFIXES) if(n>=x.v) return (n/x.v).toFixed(2)+x.s; return n.toFixed(2); }
function formatT(s) { if(!isFinite(s)) return "N/A"; let d=Math.floor(s/86400), h=Math.floor(s%86400/3600), m=Math.floor(s%3600/60); return (d?d+"d ":"")+(h?h+"h ":"")+(m?m+"m ":"")+Math.floor(s%60)+"s"; }
let curT = "Starter";

function init() {
    ['bulk', 'luck'].forEach(id => {
        let el = document.getElementById(id+'-suf');
        [...SUFFIXES].reverse().forEach(s => el.appendChild(new Option(s.s, s.s)));
        el.value = "None";
    });
    renderTabs();
    calculate();
}

function renderTabs() {
    document.getElementById("tabs-container").innerHTML = Object.keys(DATA).map(t => `<div class="tab-btn ${t===curT?'active':''}" onclick="curT='${t}';renderTabs();calculate()">${t}</div>`).join("");
}

function calculate() {
    let speed = parseFloat(document.getElementById("speed").value)||0, err = document.getElementById("error-box");
    if(speed<0.08 || speed>1) { err.style.display="block"; return; } else err.style.display="none";
    let bulk = (parseFloat(document.getElementById("bulk-num").value)||0) * (SUFFIXES.find(x=>x.s===document.getElementById('bulk-suf').value)?.v||1);
    let luck = (parseFloat(document.getElementById("luck-num").value)||0) * (SUFFIXES.find(x=>x.s===document.getElementById('luck-suf').value)?.v||1);
    let clone = parseFloat(document.getElementById("clone").value)||1, rps = (1/speed)*bulk;
    document.getElementById("cards-container").innerHTML = DATA[curT].map(r => {
        let den = parseS(r.c)/luck, na = den<1;
        let html = `<div class="card"><div class="card-title ${r.t}">${r.r}</div><div style="font-size:12px; color:var(--text-muted)">${na?"1 in 1 (Maxed)":"1 in "+formatN(den)}</div>`;
        r.s.forEach(st => {
            let nd = parseS(st.nd), time = na ? "N/A" : formatT(nd/(rps*(1/den)*clone));
            html += `<div class="stat-box ${r.t}"><div class="stat-head"><span>${st.n} <span class="stat-val">${st.v}</span></span></div><div style="font-size:12px">Need: ${formatN(nd)} | Time: <span class="stat-val">${time}</span></div></div>`;
        });
        return html + "</div>";
    }).join("");
}

document.querySelectorAll('input, select').forEach(el => el.addEventListener('input', calculate));
init();
</script>
</body>
</html>
