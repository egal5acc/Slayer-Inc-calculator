<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Rune System</title>

<style>
/* GLOBAL BOX MODEL FIX */
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #0f1115;
    color: #e2e8f0;
}

/* MAIN LAYOUT */
.wrapper {
    display: flex;
    height: 100vh;
}

/* LEFT PANEL */
.left {
    width: 340px;
    background: #151922;
    padding: 20px;
    border-right: 1px solid #2a2f3a;
    overflow-y: auto;
}

/* RIGHT PANEL */
.right {
    flex: 1;
    padding: 25px;
    overflow-y: auto;
}

/* INPUTS & LABELS */
label {
    display: block;
    margin-top: 16px;
    font-size: 13px;
    font-weight: 600;
    color: #94a3b8;
}

/* Flexbox Row for Input + Dropdown */
.input-group {
    display: flex;
    gap: 8px;
    margin-top: 6px;
}

input, select {
    background: #0f1115;
    border: 1px solid #2a2f3a;
    color: #ffffff;
    border-radius: 6px;
    font-family: 'Courier New', monospace;
    font-size: 14px;
    padding: 10px 12px;
    transition: border-color 0.2s;
}

input {
    flex: 1; /* Eingabefeld nimmt den restlichen Platz */
}

select {
    width: 90px; /* Feste Breite für das Suffix-Dropdown */
    cursor: pointer;
}

input:focus, select:focus {
    outline: none;
    border-color: #3b82f6;
}

input.error-input {
    border-color: #ef4444;
    background: #1c1214;
}

/* LIVE STATS DIRECTLY UNDER CLONE */
.live-counter {
    margin-top: 24px;
    padding-top: 16px;
    border-top: 1px solid #2a2f3a;
    font-size: 18px;
    color: #3b82f6;
    font-weight: 700;
}

.live-counter.error-text {
    color: #ef4444;
    font-size: 14px;
}

.live-counter span {
    color: #ffffff;
    font-family: 'Courier New', monospace;
    font-size: 22px;
}

/* TEXT */
h2 {
    margin-top: 0;
    margin-bottom: 15px;
    font-weight: 600;
    color: #ffffff;
}

.small {
    font-size: 12px;
    color: #64748b;
    margin: 0;
    line-height: 1.4;
}
</style>

</head>
<body>

<div class="wrapper">

    <div class="left">

        <h2>⚡ Rune Settings</h2>

        <label>⏱ Rune Speed</label>
        <div class="input-group">
            <input type="text" id="speed" value="0.1">
        </div>

        <label>📦 Rune Bulk</label>
        <div class="input-group">
            <input type="text" id="bulk-val" value="100">
            <select id="bulk-suffix">
                </select>
        </div>

        <label>🍀 Rune Luck</label>
        <div class="input-group">
            <input type="text" id="luck-val" value="1">
            <select id="luck-suffix">
                </select>
        </div>

        <label>👥 Clone</label>
        <div class="input-group">
            <input type="text" id="clones" value="1">
        </div>
        
        <div class="live-counter" id="live-display">
            🔓 Opened: <span id="live-rolls-speed">0</span> / sec
        </div>

    </div>

    <div class="right">
        <h2>📊 Rune Cards Area</h2>
        <p class="small">Your future rune cards, upgrades, and progression metrics will render here.</p>
    </div>

</div>

<script>
// Deine exakte Suffix-Liste
const suffixes = [
    "", "K", "M", "B", "T", "Qa", "Qi", "Sx", "Sp", "Oc", "No", 
    "Dc", "Ud", "Dd", "Td", "Qua", "Qui", "Sxd", "Spd", "Ocd", "Nd", 
    "Vg", "Uvg", "Dvg", "Tvg", "Qavg", "Sxvg", "Spvg", "Ocvg", "Novg", 
    "Tr", "Utg", "Dtg", "Tt", "Qatg", "Qitg", "Sxtg", "Sptg", "Octg", "Notg"
];

// Dropdowns beim Start automatisch mit den Suffixen füllen
const bulkSelect = document.getElementById('bulk-suffix');
const luckSelect = document.getElementById('luck-suffix');

suffixes.forEach((suffix, index) => {
    // Option für Bulk
    let optBulk = document.createElement('option');
    optBulk.value = index;
    optBulk.textContent = suffix === "" ? "none" : suffix;
    bulkSelect.appendChild(optBulk);

    // Option für Luck
    let optLuck = document.createElement('option');
    optLuck.value = index;
    optLuck.textContent = suffix === "" ? "none" : suffix;
    luckSelect.appendChild(optLuck);
});

// Standardmäßig "B" für Bulk auswählen (Index 3 in der Liste: "", "K", "M", "B")
bulkSelect.value = 3; 

// Formatiert Zahlen für die Anzeige (z.B. 1500 -> "1.5 K")
function formatNumber(num) {
    if (num === 0) return "0";
    if (!isFinite(num)) return "∞";
    if (num < 1000) return num.toFixed(1).replace('.0', '');

    const i = Math.floor(Math.log10(num) / 3);
    
    if (i >= suffixes.length) {
        return num.toExponential(2);
    }

    const formatted = (num / Math.pow(10, i * 3)).toFixed(2);
    return formatted.replace('.00', '') + " " + suffixes[i];
}

// Rechnet den Wert des Inputs mal den Multiplikator des Dropdowns
function getFullValue(inputEl, selectEl) {
    let rawVal = inputEl.value.replace(',', '.');
    let num = parseFloat(rawVal) || 0;
    let suffixIndex = parseInt(selectEl.value) || 0;
    
    return num * Math.pow(10, suffixIndex * 3);
}

const inputSpeed = document.getElementById('speed');
const inputBulkVal = document.getElementById('bulk-val');
const inputLuckVal = document.getElementById('luck-val');
const inputClones = document.getElementById('clones');
const liveDisplay = document.getElementById('live-display');

function updateCalculations() {
    const rawSpeed = parseFloat(inputSpeed.value.replace(',', '.')) || 0;

    // Validierung für Rune Speed
    if (rawSpeed < 0.08) {
        inputSpeed.classList.add('error-input');
        liveDisplay.classList.add('error-text');
        liveDisplay.innerHTML = "❌ Error: Min Speed is 0.08!";
        return;
    } else if (rawSpeed > 1) {
        inputSpeed.classList.add('error-input');
        liveDisplay.classList.add('error-text');
        liveDisplay.innerHTML = "❌ Error: Max Speed is 1!";
        return;
    } else {
        inputSpeed.classList.remove('error-input');
        liveDisplay.classList.remove('error-text');
    }

    // Werte berechnen unter Einbeziehung der Dropdowns
    const speed = rawSpeed;
    const bulk = getFullValue(inputBulkVal, bulkSelect);
    const clones = parseFloat(inputClones.value.replace(',', '.')) || 0;

    // Formel: (1 / Speed) * Bulk * Clones
    const rollsPerSecond = (1 / speed) * bulk * clones;
    const formattedRolls = formatNumber(rollsPerSecond);
    
    liveDisplay.innerHTML = `🔓 Opened: <span>${formattedRolls}</span> / sec`;
}

// Event-Listener auf alle Inputs und Dropdowns legen
[inputSpeed, inputBulkVal, bulkSelect, inputLuckVal, luckSelect, inputClones].forEach(element => {
    element.addEventListener('input', updateCalculations);
});

// Erster Render-Aufruf
updateCalculations();
</script>

</body>
</html>
