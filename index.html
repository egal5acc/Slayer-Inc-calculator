<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slayer Inc Rune & XP Calculator</title>
<style>
    :root {
        --bg-main: #0b0d10;
        --bg-panel: #161a22;
        --bg-card: #1c212b;
        --bg-box: #242a35;
        --border: #2e3545;
        --text-main: #e0e6ed;
        --text-muted: #8b949e;
        
        /* Farbzuweisungen basierend auf den Screenshots */
        --c-common: #d1d5db;       /* Icy / White / Silver */
        --c-uncommon: #4caf50;     /* Green (Treasury) */
        --c-rare: #2196f3;         /* Blue (Imperial, Plasmatic, Glacial) */
        --c-epic: #9c27b0;         /* Purple (Regal, Voltaris, InfernalSigil, Aetherion) */
        --c-legendary: #ff9800;    /* Orange/Amber (Auric, Ignis, Volcanic, Worldflare, Ecliptor) */
        --c-mythical: #f44336;     /* Red (Kingsmark, Pyric) */
        --c-secret: #ffd700;       /* Gold/Yellow (SolSovereign, Searing) */
        --c-celestial: #00ffff;    /* Cyan/Mint (GildedArcane, Arclight, Astralis, Frostbite, Icebound) */
        --c-unknown: #6366f1;      /* Indigo/Dark Blue (WintersWrath, Cryo) */
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: var(--bg-main);
        color: var(--text-main);
        line-height: 1.5;
        padding: 20px;
    }

    .container { max-width: 1200px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }
    
    .panel {
        background: var(--bg-panel);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 20px;
    }

    h1 { text-align: center; margin-bottom: 20px; font-size: 24px; color: #fff; }

    .input-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 15px;
    }

    .input-group { display: flex; flex-direction: column; gap: 5px; }
    .input-group label { font-size: 13px; color: var(--text-muted); font-weight: bold; }
    
    .input-row { display: flex; gap: 5px; }

    input, select {
        background: var(--bg-main);
        border: 1px solid var(--border);
        color: #fff;
        padding: 12px;
        border-radius: 8px;
        font-size: 16px;
        outline: none;
        transition: border-color 0.2s;
    }
    input:focus, select:focus { border-color: var(--c-rare); }
    input { flex: 1; min-width: 0; }

    .error-box {
        background: #2a1414;
        border: 1px solid var(--c-mythical);
        color: #ff8888;
        padding: 15px;
        border-radius: 8px;
        font-weight: bold;
        text-align: center;
        margin-top: 15px;
        display: none;
    }

    .global-stats {
        margin-top: 15px;
        padding-top: 15px;
        border-top: 1px solid var(--border);
        display: flex;
        justify-content: space-around;
        font-size: 14px;
        color: var(--text-muted);
    }
    .global-stats span { color: #fff; font-weight: bold; }

    .tabs {
        display: flex;
        gap: 10px;
        overflow-x: auto;
        padding-bottom: 5px;
        margin-bottom: 15px;
    }

    .tab-btn {
        background: var(--bg-main);
        border: 1px solid var(--border);
        color: var(--text-muted);
        padding: 10px 20px;
        border-radius: 8px;
        cursor: pointer;
        font-weight: bold;
        transition: 0.2s;
        white-space: nowrap;
    }
    .tab-btn.active { background: var(--border); color: #fff; }

    .cards-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 20px;
    }

    .card {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 15px;
        display: flex;
        flex-direction: column;
        gap: 15px;
    }

    .card-header { text-align: center; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
    .card-title { font-size: 19px; font-weight: bold; text-transform: uppercase; margin-bottom: 3px; }
    .card-chance { font-size: 12px; color: var(--text-muted); }

    .stat-box {
        background: var(--bg-box);
        border-radius: 8px;
        padding: 12px;
        border-left: 4px solid var(--border);
    }
    .stat-head { display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 8px; font-size: 14px; }
    .stat-val { color: var(--c-secret); }
    
    .stat-details {
        display: grid;
        grid-template-columns: 1fr;
        gap: 5px;
        font-size: 13px;
        color: var(--text-muted);
    }
    .stat-details span { color: #fff; font-weight: bold; }
    .time-highlight { color: #ffeb3b !important; font-weight: bold; }

    /* Dynamische Farbklassen */
    .common { color: var(--c-common); border-left-color: var(--c-common); }
    .uncommon { color: var(--c-uncommon); border-left-color: var(--c-uncommon); }
    .rare { color: var(--c-rare); border-left-color: var(--c-rare); }
    .epic { color: var(--c-epic); border-left-color: var(--c-epic); }
    .legendary { color: var(--c-legendary); border-left-color: var(--c-legendary); }
    .mythical { color: var(--c-mythical); border-left-color: var(--c-mythical); }
    .secret { color: var(--c-secret); border-left-color: var(--c-secret); }
    .celestial { color: var(--c-celestial); border-left-color: var(--c-celestial); }
    .unknown { color: var(--c-unknown); border-left-color: var(--c-unknown); }

    .title-common { color: var(--c-common); }
    .title-uncommon { color: var(--c-uncommon); }
    .title-rare { color: var(--c-rare); }
    .title-epic { color: var(--c-epic); }
    .title-legendary { color: var(--c-legendary); }
    .title-mythical { color: var(--c-mythical); }
    .title-secret { color: var(--c-secret); }
    .title-celestial { color: var(--c-celestial); }
    .title-unknown { color: var(--c-unknown); }
</style>
</head>
<body>

<div class="container">
    <!-- INPUT PANEL -->
    <div class="panel">
        <h1>Slayer Inc Rune & XP Calculator</h1>
        <div class="input-grid">
            <div class="input-group">
                <label>Rune Speed (sec)</label>
                <input type="number" id="speed" value="0.08" step="0.01">
            </div>
            <div class="input-group">
                <label>Rune Bulk</label>
                <div class="input-row">
                    <input type="number" id="bulk-num" value="100">
                    <select id="bulk-suf"></select>
                </div>
            </div>
            <div class="input-group">
                <label>Rune Luck</label>
                <div class="input-row">
                    <input type="number" id="luck-num" value="1.0">
                    <select id="luck-suf"></select>
                </div>
            </div>
            <div class="input-group">
                <label>Rune Clone</label>
                <input type="number" id="clone" value="1" min="1">
            </div>
        </div>
        
        <div id="error-box" class="error-box">⚠️ SYSTEM ERROR: Rune Speed darf nicht unter 0.08s liegen!</div>

        <div class="global-stats">
            <div>Rolls/Sekunde: <span id="out-rolls">0</span></div>
            <div>Runen/Sekunde: <span id="out-runs">0</span></div>
        </div>
    </div>

    <!-- MAIN INTERFACE -->
    <div class="panel">
        <div class="tabs" id="tabs-container"></div>
        <div class="cards-grid" id="cards-container"></div>
        
        <!-- XP CALCULATOR CARD -->
        <div class="card" style="max-width: 500px; margin: 30px auto 0 auto; border: 1px solid var(--c-rare);">
            <div class="card-header">
                <div class="card-title title-rare">XP Calculator</div>
                <div class="card-chance">Berechnet die benötigten Erfahrungspunkte live</div>
            </div>
            <div style="display: flex; flex-direction: column; gap: 15px; margin-top: 10px;">
                <div class="input-group">
                    <label>Current Level (S)</label>
                    <input type="number" id="xp-current-lvl" value="1" min="0">
                </div>
                <div class="input-group">
                    <label>Wanted Level (E)</label>
                    <input type="number" id="xp-wanted-lvl" value="100" min="0">
                </div>
                <div class="stat-box rare">
                    <div class="stat-head">Berechnungsergebnis:</div>
                    <div class="stat-details" style="font-size: 15px;">
                        <div>Benötigte Gesamtsumme:</div>
                        <div class="time-highlight" id="xp-needed-out">0</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
// Suffix-System bis hoch zu Notg
const SUFFIXES = [
    {v: 1e117, s: 'Notg'}, {v: 1e114, s: 'Octg'}, {v: 1e111, s: 'Sptg'}, {v: 1e108, s: 'Sxtg'},
    {v: 1e105, s: 'Qitg'}, {v: 1e102, s: 'Qatg'}, {v: 1e99,  s: 'Tt'},   {v: 1e96,  s: 'Dtg'},
    {v: 1e93,  s: 'Utg'},  {v: 1e90,  s: 'Tr'},   {v: 1e87,  s: 'Novg'}, {v: 1e84,  s: 'Ocvg'},
    {v: 1e81,  s: 'Spvg'}, {v: 1e78,  s: 'Sxvg'}, {v: 1e75,  s: 'Qavg'}, {v: 1e72,  s: 'Tvg'},
    {v: 1e69,  s: 'Dvg'},  {v: 1e66,  s: 'Uvg'},  {v: 1e63,  s: 'Vg'},   {v: 1e60,  s: 'Nd'},
    {v: 1e57,  s: 'Ocd'},  {v: 1e54,  s: 'Spd'},  {v: 1e51,  s: 'Sxd'},  {v: 1e48,  s: 'Qui'},
    {v: 1e45,  s: 'Qua'},  {v: 1e42,  s: 'Td'},   {v: 1e39,  s: 'Dd'},   {v: 1e36,  s: 'Ud'},
    {v: 1e33,  s: 'Dc'},   {v: 1e30,  s: 'N'},    {v: 1e27,  s: 'Oc'},   {v: 1e24,  s: 'Sp'},
    {v: 1e21,  s: 'Sx'},   {v: 1e18,  s: 'Qi'},   {v: 1e15,  s: 'Qa'},   {v: 1e12,  s: 'T'},
    {v: 1e9,   s: 'B'},    {v: 1e6,   s: 'M'},    {v: 1e3,   s: 'K'},    {v: 1,     s: 'None'}
];

// Komplette Runen-Datenbank basierend auf allen 5 Screenshots sortiert nach Elementen
const DATA = {
    "Golden Runes": [
        { r: "Shiny", c: "6.185Ud", t: "common", s: "+8 Golden Points, +x10 Xp" },
        { r: "Regal", c: "61.85N", t: "epic", s: "+x25 Golden Points" },
        { r: "Auric", c: "3.092N", t: "legendary", s: "+x25 Damage, +x20 Essence, x2.5 RuneLuck" },
        { r: "Imperial", c: "247.4Oc", t: "rare", s: "+x125 Golden Points, x2 Xp, x25 Essence" },
        { r: "Treasury", c: "49.48Oc", t: "uncommon", s: "x8 Power, x4 RuneLuck, +5% Gold Chance" },
        { r: "GildedArcane", c: "778.4Ud", t: "celestial", s: "x8 Xp, x10 Lava, x3 RuneBulk" },
        { r: "Kingsmark", c: "201.6Ud", t: "mythical", s: "x75 Power" },
        { r: "SolSovereign", c: "816", t: "secret", s: "x100 Golden Points" }
    ],
    "Fire Runes": [
        { r: "Charred", c: "15.290Oc", t: "common", s: "+x5 Magma" },
        { r: "Ignis", c: "152.9Qi", t: "legendary", s: "x15 Magma, +x10 Damage" },
        { r: "Cinder", c: "3.138Qi", t: "common", s: "+x3 Power, +x3 Golden Points, x1.5 RuneLuck" },
        { r: "Pyric", c: "123.4Qa", t: "mythical", s: "+x45 Essence, +x25 Magma, x8 RuneBulk" },
        { r: "Searing", c: "852.5Qi", t: "secret", s: "x25 Magma, +x12 Golden Points, x3 RuneLuck" },
        { r: "Volcanic", c: "38.21Sp", t: "legendary", s: "x15 Power, x5 Lava, x25 Magma" },
        { r: "Worldflare", c: "42.27Sp", t: "legendary", s: "x5 Plasma" },
        { r: "InfernalSigil", c: "24.93B", t: "epic", s: "x45 Power" }
    ],
    "Plasma Runes": [
        { r: "Plasmatic", c: "2.049Sp", t: "rare", s: "+x5 Plasma, +x15 Power" },
        { r: "Arclight", c: "52.46Sx", t: "celestial", s: "+x25 Plasma, x4 Xp, x4 RuneBulk" },
        { r: "Voltaris", c: "12.71Sp", t: "epic", s: "x3 Lava, x25 Magma, x5 RuneLuck" },
        { r: "Aetherion", c: "486.7Sp", t: "epic", s: "x12 Power, x5 Plasma, x7 RuneLuck" },
        { r: "Astralis", c: "545.6Sx", t: "celestial", s: "x9 Plasma, x5 Lava, x3 RuneLuck" },
        { r: "Ecliptor", c: "2.729M", t: "legendary", s: "x10 Plasma, x6 Lava, x3 Aura Luck" }
    ],
    "Ice Runes": [
        { r: "Snowfall", c: "4.286Ud", t: "common", s: "x10 Snowflakes, x15 Snowflakes, x10 Xp" },
        { r: "Frostbite", c: "942.1Dc", t: "celestial", s: "x40 Power, x10 Xp, x7 Snowflakes" },
        { r: "Icebound", c: "47.10c", t: "celestial", s: "x2 XP, x5 Snowflakes, x9 Plasma" },
        { r: "Glacial", c: "1.884Sp", t: "rare", s: "x50 Power, x45 Magma, x3 RuneLuck" },
        { r: "WintersWrath", c: "94.21Qa", t: "unknown", s: "x25 Power, x5 RuneBulk" },
        { r: "AbsoluteZero", c: "7.537T", t: "common", s: "x50 Xp, x25 Power, x15 Ice" },
        { r: "Eternalwhiteout", c: "3.142M", t: "common", s: "x25 Power" },
        { r: "Frost", c: "599.8Qi", t: "common", s: "x6.62 Power, x4 Ice, x10 Xp" },
        { r: "Glacier", c: "1.758M", t: "common", s: "x100 Golden Points, x5 Ice, x10 Xp" },
        { r: "Cryo", c: "0", t: "unknown", s: "Rarity Not Discovered" }
    ]
};

let currentTab = Object.keys(DATA)[0];

function parseStringValue(str) {
    if(!str) return 0;
    str = String(str).toLowerCase().replace(/,/g, '').trim();
    const match = str.match(/^([0-9.]+)([a-z]*)$/);
    if (!match) return parseFloat(str) || 0;
    let val = parseFloat(match[1]);
    let suf = match[2];
    if (suf) {
        if(suf === 'de') suf = 'dc';
        const found = SUFFIXES.find(x => x.s.toLowerCase() === suf);
        if (found) val *= found.v;
    }
    return val;
}

function formatNum(num) {
    if (!isFinite(num) || isNaN(num) || num <= 0) return "0";
    if (num < 1000) return Number.isInteger(num) ? num.toString() : num.toFixed(2);
    for (let i = 0; i < SUFFIXES.length; i++) {
        if (SUFFIXES[i].s !== 'None' && num >= SUFFIXES[i].v) {
            return (num / SUFFIXES[i].v).toFixed(2) + " " + SUFFIXES[i].s;
        }
    }
    return num.toFixed(2);
}

function formatTime(sec) {
    if (!isFinite(sec) || isNaN(sec) || sec <= 0) return "N/A";
    if (sec < 60) return sec.toFixed(1) + "s";
    if (sec < 3600) return Math.floor(sec/60) + "m " + Math.floor(sec%60) + "s";
    if (sec < 86400) return Math.floor(sec/3600) + "h " + Math.floor((sec%3600)/60) + "m";
    return Math.floor(sec/86400) + "d " + Math.floor((sec%86400)/3600) + "h";
}

// Initialisiert Suffix-Dropdowns
function setupDropdowns() {
    const selects = ['bulk-suf', 'luck-suf'];
    selects.forEach(id => {
        const el = document.getElementById(id);
        el.innerHTML = '';
        SUFFIXES.forEach(x => {
            const opt = document.createElement('option');
            opt.value = x.s;
            opt.textContent = x.s;
            if(id === 'luck-suf' && x.s === 'None') opt.selected = true;
            if(id === 'bulk-suf' && x.s === 'None') opt.selected = true;
            el.appendChild(opt);
        });
    });
}

function updateCalculations() {
    const speed = parseFloat(document.getElementById('speed').value) || 0.08;
    
    if (speed < 0.08) {
        document.getElementById('error-box').style.display = 'block';
        return;
    } else {
        document.getElementById('error-box').style.display = 'none';
    }

    const bulkNum = parseFloat(document.getElementById('bulk-num').value) || 0;
    const bulkSuf = document.getElementById('bulk-suf').value;
    const bulk = parseStringValue(bulkNum + bulkSuf);

    const luckNum = parseFloat(document.getElementById('luck-num').value) || 0;
    const luckSuf = document.getElementById('luck-suf').value;
    const luck = parseStringValue(luckNum + luckSuf);

    const clone = parseFloat(document.getElementById('clone').value) || 1;

    const rollsPerSec = 1 / speed;
    const runesPerSec = rollsPerSec * bulk * clone;

    document.getElementById('out-rolls').textContent = rollsPerSec.toFixed(2);
    document.getElementById('out-runs').textContent = formatNum(runesPerSec);

    // XP Formel Berechnung
    const currentLvl = parseInt(document.getElementById('xp-current-lvl').value) || 0;
    const wantedLvl = parseInt(document.getElementById('xp-wanted-lvl').value) || 0;
    
    let xpNeeded = 0;
    if (wantedLvl > currentLvl) {
        xpNeeded = 500 * (Math.pow(1.2, wantedLvl) - Math.pow(1.2, currentLvl));
    }
    document.getElementById('xp-needed-out').textContent = formatNum(xpNeeded);

    renderCards(runesPerSec, luck);
}

function renderTabs() {
    const container = document.getElementById('tabs-container');
    container.innerHTML = '';
    Object.keys(DATA).forEach(key => {
        const btn = document.createElement('button');
        btn.className = `tab-btn ${key === currentTab ? 'active' : ''}`;
        btn.textContent = key;
        btn.onclick = () => {
            currentTab = key;
            renderTabs();
            updateCalculations();
        };
        container.appendChild(btn);
    });
}

function renderCards(runesPerSec, luck) {
    const container = document.getElementById('cards-container');
    container.innerHTML = '';

    const runes = DATA[currentTab] || [];
    runes.forEach(rune => {
        const baseChance = parseStringValue(rune.c);
        // Höheres Luck senkt die benötigte Chance-Schwelle
        const actualChance = baseChance / luck; 
        
        const secondsNeeded = runesPerSec > 0 ? (actualChance / runesPerSec) : Infinity;

        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
            <div class="card-header">
                <div class="card-title title-${rune.t}">${rune.r}</div>
                <div class="card-chance">Basis-Chance: 1 / ${rune.c}</div>
            </div>
            <div class="stat-box ${rune.t}">
                <div class="stat-head">Benötigte Zeit:</div>
                <div class="stat-details">
                    <div>Zeitspanne: <span class="time-highlight">${formatTime(secondsNeeded)}</span></div>
                </div>
            </div>
            <div style="font-size:12px; color: var(--text-muted); background:var(--bg-main); padding:8px; border-radius:6px;">
                <strong style="color:#fff;">Effekte:</strong><br>${rune.s}
            </div>
        `;
        container.appendChild(card);
    });
}

// Event Listeners registrieren
document.querySelectorAll('input, select').forEach(el => {
    el.addEventListener('input', updateCalculations);
});

// Init
setupDropdowns();
renderTabs();
updateCalculations();
</script>
</body>
</html>
