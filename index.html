<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Rune System</title>

<style>
/* GLOBAL BOX MODEL FIX */
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #0f1115;
    color: #e2e8f0;
}

/* MAIN LAYOUT */
.wrapper {
    display: flex;
    height: 100vh;
}

/* LEFT PANEL */
.left {
    width: 320px;
    background: #151922;
    padding: 20px;
    border-right: 1px solid #2a2f3a;
    overflow-y: auto;
}

/* RIGHT PANEL */
.right {
    flex: 1;
    padding: 25px;
    overflow-y: auto;
}

/* INPUTS */
label {
    display: block;
    margin-top: 16px;
    font-size: 13px;
    font-weight: 600;
    color: #94a3b8;
}

input {
    width: 100%;
    margin-top: 6px;
    padding: 10px 12px;
    background: #0f1115;
    border: 1px solid #2a2f3a;
    color: #ffffff;
    border-radius: 6px;
    font-family: 'Courier New', monospace;
    font-size: 14px;
    transition: border-color 0.2s, background-color 0.2s;
}

input:focus {
    outline: none;
    border-color: #3b82f6;
}

input.error-input {
    border-color: #ef4444;
    background: #1c1214;
}

/* MAKES THE LIVE DISPLAY MUCH LARGER */
.live-counter {
    margin-top: 24px;
    padding: 12px 0;
    border-top: 1px solid #2a2f3a;
    font-size: 18px; /* Größere Schrift */
    color: #3b82f6;
    font-weight: 700;
}

.live-counter.error-text {
    color: #ef4444;
    font-size: 14px;
}

.live-counter span {
    color: #ffffff;
    font-family: 'Courier New', monospace;
    font-size: 22px; /* Zahlen extra groß */
}

/* TEXT */
h2 {
    margin-top: 0;
    margin-bottom: 15px;
    font-weight: 600;
    color: #ffffff;
}

.small {
    font-size: 12px;
    color: #64748b;
    margin: 0;
    line-height: 1.4;
}
</style>

</head>
<body>

<div class="wrapper">

    <div class="left">

        <h2>⚡ Rune Settings</h2>

        <label>⏱ Rune Speed</label>
        <input type="text" id="speed" value="1">

        <label>📦 Rune Bulk</label>
        <input type="text" id="bulk" value="100B">

        <label>🍀 Rune Luck</label>
        <input type="text" id="luck" value="100">

        <label>👥 Clone</label>
        <input type="text" id="clones" value="1">
        
        <div class="live-counter" id="live-display">
            🔓 Opened: <span id="live-rolls-speed">0</span> / sec
        </div>

    </div>

    <div class="right">
        <h2>📊 Rune Cards Area</h2>
        <p class="small">Your future rune cards, upgrades, and progression metrics will render here.</p>
    </div>

</div>

<script>
// Suffixe für die Konvertierung in beide Richtungen
const suffixes = [
    "", "K", "M", "B", "T", "Qa", "Qi", "Sx", "Sp", "Oc", "No", 
    "Dc", "Ud", "Dd", "Td", "Qua", "Qui", "Sxd", "Spd", "Ocd", "Nd", 
    "Vg", "Uvg", "Dvg", "Tvg", "Qavg", "Sxvg", "Spvg", "Ocvg", "Novg", 
    "Tr", "Utg", "Dtg", "Tt", "Qatg", "Qitg", "Sxtg", "Sptg", "Octg", "Notg"
];

// Funktion: Macht aus großen Zahlen formatierte Strings (z.B. 100000 -> "100 K")
function formatNumber(num) {
    if (num === 0) return "0";
    if (!isFinite(num)) return "∞";
    if (num < 1000) return num.toFixed(1).replace('.0', '');

    const i = Math.floor(Math.log10(num) / 3);
    
    if (i >= suffixes.length) {
        return num.toExponential(2);
    }

    const formatted = (num / Math.pow(10, i * 3)).toFixed(2);
    return formatted.replace('.00', '') + " " + suffixes[i];
}

// NEU: Funktion, die "100B" wieder in eine echte mathematische Zahl umwandelt!
function parseInputValue(val) {
    if (!val) return 0;
    
    // Bereinigen (Komma zu Punkt, Leerzeichen weg)
    let str = val.toString().replace(',', '.').trim();
    
    // Extrahiere die reine Zahl am Anfang
    let numPart = parseFloat(str) || 0;
    
    // Suche nach einem Suffix am Ende des Strings
    let suffixPart = str.replace(/[0-9.]/g, '').trim();
    
    if (suffixPart) {
        // Finde den Multiplikator-Index aus deiner Suffix-Liste
        const index = suffixes.findIndex(s => s.toLowerCase() === suffixPart.toLowerCase());
        if (index > 0) {
            numPart = numPart * Math.pow(10, index * 3);
        }
    }
    
    return numPart;
}

const inputSpeed = document.getElementById('speed');
const inputBulk = document.getElementById('bulk');
const inputLuck = document.getElementById('luck');
const inputClones = document.getElementById('clones');
const liveDisplay = document.getElementById('live-display');

function updateCalculations() {
    // Nutzen jetzt den intelligenten Input-Parser für Idle-Mengen
    const speed = parseInputValue(inputSpeed.value);
    const bulk = parseInputValue(inputBulk.value);
    const clones = parseInputValue(inputClones.value);

    // Speed Constraints Validierung (0.08 - 1.0)
    // Wir nehmen den rohen String-Wert für die Validierung, damit wir direkte Treffer landen
    const rawSpeed = parseFloat(inputSpeed.value.replace(',', '.')) || 0;

    if (rawSpeed < 0.08) {
        inputSpeed.classList.add('error-input');
        liveDisplay.classList.add('error-text');
        liveDisplay.innerHTML = "❌ Error: Min Speed is 0.08!";
        return;
    } else if (rawSpeed > 1) {
        inputSpeed.classList.add('error-input');
        liveDisplay.classList.add('error-text');
        liveDisplay.innerHTML = "❌ Error: Max Speed is 1!";
        return;
    } else {
        inputSpeed.classList.remove('error-input');
        liveDisplay.classList.remove('error-text');
    }

    // Berechnung: (1 / Speed) * Bulk * Clones
    const rollsPerSecond = (1 / speed) * bulk * clones;
    const formattedRolls = formatNumber(rollsPerSecond);
    
    // Ausgabe im vergrößerten UI-Element
    liveDisplay.innerHTML = `🔓 Opened: <span>${formattedRolls}</span> / sec`;
}

[inputSpeed, inputBulk, inputLuck, inputClones].forEach(input => {
    input.addEventListener('input', updateCalculations);
});

// Initialer Startlauf
updateCalculations();
</script>

</body>
</html>
