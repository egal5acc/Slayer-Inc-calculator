<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Rune System</title>

<style>
/* GLOBAL BOX MODEL FIX */
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #0f1115;
    color: #e2e8f0;
}

/* MAIN LAYOUT */
.wrapper {
    display: flex;
    height: 100vh;
}

/* LEFT PANEL */
.left {
    width: 320px;
    background: #151922;
    padding: 20px;
    border-right: 1px solid #2a2f3a;
    overflow-y: auto;
}

/* RIGHT PANEL */
.right {
    flex: 1;
    padding: 25px;
    overflow-y: auto;
}

/* INPUTS */
label {
    display: block;
    margin-top: 16px;
    font-size: 13px;
    font-weight: 600;
    color: #94a3b8;
}

input, textarea {
    width: 100%;
    margin-top: 6px;
    padding: 10px 12px;
    background: #0f1115;
    border: 1px solid #2a2f3a;
    color: #ffffff;
    border-radius: 6px;
    font-family: 'Courier New', monospace;
    font-size: 14px;
    transition: border-color 0.2s;
}

input:focus, textarea:focus {
    outline: none;
    border-color: #3b82f6;
}

/* TEXT */
h2 {
    margin-top: 0;
    margin-bottom: 15px;
    font-weight: 600;
    color: #ffffff;
}

.small {
    font-size: 12px;
    color: #64748b;
    margin: 0;
    line-height: 1.4;
}
</style>

</head>

<body>

<div class="wrapper">

    <div class="left">

        <h2>⚡ Rune Settings</h2>

        <label>⏱ Rune Speed</label>
        <input type="number" step="0.1" value="0.1">

        <label>📦 Rune Bulk</label>
        <input type="number" value="100">

        <label>🍀 Rune Luck</label>
        <input type="number" step="0.1" value="1">

        <label>👥 Clone</label>
        <input type="number" value="1">

    </div>

    <div class="right">
        <h2>📊 Output Panel</h2>
        <p class="small">
            Rune results, calculations, and future rune cards will appear here.
        </p>
    </div>

</div>

</body>
</html>
